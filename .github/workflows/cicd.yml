name: Admin_Naman

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build and Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/admin:${{ github.sha }} .

      - name: Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/admin:${{ github.sha }}

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: self-hosted

    steps:
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Pull Latest Docker Image
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/admin:${{ github.sha }}

      - name: Remove Old Container
        run: |
          if [ "$(docker ps -aq -f name=erp-frontend-service)" ]; then
            docker rm -f erp-frontend-service
          fi

      - name: Run New Docker Container
        run: |
          docker run -d -p 5173:80 \
            --name erp-frontend-service \
            --restart unless-stopped \
            ${{ secrets.DOCKER_USERNAME }}/admin:${{ github.sha }}
